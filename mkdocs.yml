site_name: Sampler Lab
site_description: Transparent Monte Carlo methods, diagnostics, and benchmark laboratories
site_url: https://tylerperlman.github.io/sampler-lab/
repo_url: https://github.com/TylerPerlman/sampler-lab
repo_name: TylerPerlman/sampler-lab
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            filters: ["!^_"]
            heading_level: 2
            members_order: source
            show_root_heading: true
            show_source: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Roadmap: roadmap.md
  - Public references: references.md
  - Public API policy: public_api.md
  - Tutorial notebooks:
      - Overview: notebooks/index.md
      - Orientation and diagnostics: notebooks/00_orientation_and_diagnostics.ipynb
      - Exact and IID sampling: notebooks/01_exact_and_iid_sampling.ipynb
      - Importance sampling: notebooks/02_importance_sampling.ipynb
      - Particle methods: notebooks/03_particle_methods.ipynb
      - Finite-state Markov theory: notebooks/04_finite_state_markov_theory.ipynb
      - Metropolis, Gibbs, and Ising: notebooks/05_metropolis_gibbs_and_ising.ipynb
      - Annealed paths and free energy: notebooks/06_annealed_paths_and_free_energy.ipynb
      - Langevin sampling: notebooks/07_langevin_sampling.ipynb
      - Hamiltonian and underdamped dynamics: notebooks/08_hamiltonian_and_underdamped_dynamics.ipynb
      - Geometry, conditioning, and ensembles: notebooks/09_geometry_conditioning_and_ensembles.ipynb
  - API reference: api.md
  - Benchmarking: benchmarking.md
  - Performance: performance.md
  - Testing and reproducibility: testing.md
  - Releases and installation: releasing.md
  - Methods:
      - Exact sampling: methods/exact_sampling.md
      - Importance sampling: methods/importance_sampling.md
      - Particle methods: methods/particle_methods.md
      - Markov theory: methods/markov_theory.md
      - Gibbs, Metropolis, and Ising: methods/gibbs_metropolis.md
      - Annealed paths: methods/annealed_paths.md
      - Langevin dynamics: methods/langevin_dynamics.md
      - Hamiltonian dynamics: methods/hamiltonian_dynamics.md
      - Conditioning and ensembles: methods/conditioning_ensembles.md
      - Adaptive and policy sampling: methods/adaptive_policy_sampling.md
      - Rare events: methods/rare_events.md
  - Design plans:
      - Policy-gradient sampling: plans/policy_gradient_sampling.md
      - Cross-method benchmarks: plans/cross_method_benchmarks.md
  - Reference benchmark:
      - Overview: reference/continuous_benchmark/README.md
      - Summary: reference/continuous_benchmark/benchmark_summary.md

not_in_nav: |
  build_status.md

strict: true
