name: Ruff autofix notebook pilot

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ruff-autofix.yml

permissions:
  contents: write
  pull-requests: read

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/notebook-visual-pilot
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,notebooks]'
      - name: Apply Ruff fixes and formatting
        run: |
          ruff check . --fix --exit-zero
          ruff format .
      - name: Commit changes when needed
        run: |
          if git diff --quiet; then
            echo "Ruff produced no changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml tools docs/notebooks
          git commit -m "Normalize notebook pilot formatting"
          git push origin HEAD:agent/notebook-visual-pilot
