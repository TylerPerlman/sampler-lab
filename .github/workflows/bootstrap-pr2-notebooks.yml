name: Finalize PR 2 notebooks

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: write

concurrency:
  group: finalize-pr2-notebooks
  cancel-in-progress: true

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/notebook-sequential-markov-v2
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,notebooks]'
      - name: Download the generated notebook artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/pr2-artifact
          gh api \
            repos/${GITHUB_REPOSITORY}/actions/artifacts/8295466980/zip \
            > /tmp/pr2-artifact.zip
          unzip -q /tmp/pr2-artifact.zip -d /tmp/pr2-artifact
      - name: Restore notebooks and documentation updates
        run: python tools/bootstrap_pr2_finalize.py /tmp/pr2-artifact
      - name: Update the free-energy result API usage
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("docs/notebooks/06_annealed_paths_and_free_energy.ipynb")
          notebook = json.loads(path.read_text(encoding="utf-8"))
          replacements = {
              "direct.ratio_estimate": "direct.ratio.value",
              "direct.log_ratio_estimate": "direct.ratio.log_value",
              "direct.free_energy_standard_error": "direct.standard_error",
              "jarzynski.log_ratio_estimate": "jarzynski.ratio.log_value",
          }
          for cell in notebook["cells"]:
              if cell.get("cell_type") != "code":
                  continue
              source = "".join(cell.get("source", []))
              for old, new in replacements.items():
                  source = source.replace(old, new)
              cell["source"] = source.splitlines(keepends=True)
          path.write_text(
              json.dumps(notebook, ensure_ascii=False, indent=1) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Execute publication notebooks
        env:
          SAMPLER_LAB_NOTEBOOK_MODE: publication
        run: >-
          pytest --nbmake
          docs/notebooks/03_particle_methods.ipynb
          docs/notebooks/04_finite_state_markov_theory.ipynb
          docs/notebooks/05_metropolis_gibbs_and_ising.ipynb
          docs/notebooks/06_annealed_paths_and_free_energy.ipynb
          --nbmake-timeout=600 --overwrite
      - name: Upload failed notebook state
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr2-notebook-failure
          path: |
            docs/notebooks/03_particle_methods.ipynb
            docs/notebooks/04_finite_state_markov_theory.ipynb
            docs/notebooks/05_metropolis_gibbs_and_ising.ipynb
            docs/notebooks/06_annealed_paths_and_free_energy.ipynb
      - name: Normalize committed notebook outputs
        run: >-
          python tools/normalize_notebooks.py
          docs/notebooks/03_particle_methods.ipynb
          docs/notebooks/04_finite_state_markov_theory.ipynb
          docs/notebooks/05_metropolis_gibbs_and_ising.ipynb
          docs/notebooks/06_annealed_paths_and_free_energy.ipynb
      - name: Remove one-shot bootstrap files
        run: |
          rm tools/bootstrap_pr2_finalize.py
          rm .github/workflows/bootstrap-pr2-notebooks.yml
      - name: Validate generated suite
        run: |
          python tools/check_notebook_manifest.py
          ruff check .
          ruff format --check .
          mkdocs build --strict
      - name: Commit generated notebooks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add sequential and Markov tutorial notebooks"
          git push
