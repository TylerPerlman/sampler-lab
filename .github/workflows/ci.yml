name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality, docs, packaging, and publication hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python tools/publication_check.py --root .
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src/sampler_lab
      - run: python -m compileall -q src tests tools
      - run: mkdocs build --strict
      - name: Build and inspect distributions
        run: |
          python -m build
          python -m twine check dist/*
          python tools/publication_check.py --root . --artifacts dist site
      - name: Verify installed package and console entry points
        shell: bash
        run: |
          python -c "import importlib.metadata as m; assert m.version('sampler-lab') == '0.12.0'"
          for command in             sampler-lab-disk-benchmark             sampler-lab-importance-demo             sampler-lab-particle-demo             sampler-lab-markov-demo             sampler-lab-ising-demo             sampler-lab-annealing-demo             sampler-lab-langevin-demo             sampler-lab-hamiltonian-demo             sampler-lab-geometry-demo             sampler-lab-policy-demo             sampler-lab-rare-event-demo             sampler-lab-benchmark
          do
            command -v "$command"
          done

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Unit tests
        run: pytest -m "not statistical"
      - name: Statistical tests in isolated processes
        shell: bash
        run: |
          mapfile -t files < <(grep -rl '@pytest.mark.statistical' tests --include='test_*.py' | sort)
          if (( ${#files[@]} == 0 )); then
            echo "No statistical test files found"
            exit 1
          fi
          for file in "${files[@]}"; do
            echo "::group::$file"
            timeout 300s pytest "$file" -m statistical
            echo "::endgroup::"
          done
