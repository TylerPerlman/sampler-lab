name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality, docs, and packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,notebooks]'
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src/sampler_lab
      - run: python -m compileall -q src tests tools
      - run: mkdocs build --strict
      - name: Build distributions
        run: python -m build
      - name: Check distribution metadata
        run: python -m twine check dist/*
      - name: Verify wheel typing marker
        run: |
          python - <<'PY'
          import glob
          import zipfile

          wheel = glob.glob("dist/*.whl")
          assert len(wheel) == 1, wheel
          with zipfile.ZipFile(wheel[0]) as archive:
              assert "sampler_lab/py.typed" in archive.namelist()
          PY
      - name: Install built wheel
        run: python -m pip install --force-reinstall --no-deps dist/*.whl
      - name: Verify installed metadata, PEP 561 typing, and console entry points
        shell: bash
        run: |
          python - <<'PY'
          import importlib.metadata as metadata

          import sampler_lab

          assert metadata.version("sampler-lab") == sampler_lab.__version__
          package_files = metadata.files("sampler-lab") or ()
          assert any(str(path) == "sampler_lab/py.typed" for path in package_files)
          PY
          consumer_dir=$(mktemp -d)
          cat > "$consumer_dir/consumer.py" <<'PY'
          from sampler_lab import make_rng

          rng = make_rng(2022)
          value: float = float(rng.normal())
          PY
          (
            cd "$consumer_dir"
            mypy --strict consumer.py
          )
          for command in \
            sampler-lab-disk-benchmark \
            sampler-lab-importance-demo \
            sampler-lab-particle-demo \
            sampler-lab-markov-demo \
            sampler-lab-ising-demo \
            sampler-lab-annealing-demo \
            sampler-lab-langevin-demo \
            sampler-lab-hamiltonian-demo \
            sampler-lab-geometry-demo \
            sampler-lab-policy-demo \
            sampler-lab-rare-event-demo \
            sampler-lab-benchmark
          do
            command -v "$command"
          done

  notebooks:
    name: Tutorial notebooks (quick mode)
    runs-on: ubuntu-latest
    env:
      SAMPLER_LAB_NOTEBOOK_MODE: quick
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,notebooks]'
      - name: Validate notebook JSON
        run: |
          python - <<'PY'
          from pathlib import Path

          import nbformat

          paths = sorted(Path("docs/notebooks").glob("*.ipynb"))
          assert paths, "no tutorial notebooks found"
          for path in paths:
              notebook = nbformat.read(path, as_version=4)
              nbformat.validate(notebook)
          print(f"Validated {len(paths)} notebooks")
          PY
      - run: python tools/check_notebook_manifest.py
      - name: Execute notebooks
        run: pytest --nbmake docs/notebooks/*.ipynb --nbmake-timeout=300 --overwrite
      - name: Upload executed quick-mode notebooks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tutorial-notebooks-quick
          path: docs/notebooks/*.ipynb

  coverage:
    name: Unit-test coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: pytest -m "not statistical" --cov=sampler_lab --cov-report=term-missing --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Unit tests
        run: pytest -m "not statistical"
      - name: Statistical tests in isolated processes
        shell: bash
        run: |
          mapfile -t files < <(grep -rl '@pytest.mark.statistical' tests --include='test_*.py' | sort)
          if (( ${#files[@]} == 0 )); then
            echo "No statistical test files found"
            exit 1
          fi
          for file in "${files[@]}"; do
            echo "::group::$file"
            timeout 300s pytest "$file" -m statistical
            echo "::endgroup::"
          done
