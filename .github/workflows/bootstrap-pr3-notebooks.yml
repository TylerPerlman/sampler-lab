name: Bootstrap PR 3 notebooks

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: bootstrap-pr3-notebooks
  cancel-in-progress: true

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/notebook-continuous-geometry
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,notebooks]'
      - name: Restore notebook generator
        run: base64 -d tools/bootstrap_pr3_notebooks.py.gz.b64 | gzip -d > tools/bootstrap_pr3_notebooks.py
      - name: Patch generated notebook source
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tools/bootstrap_pr3_notebooks.py")
          text = path.read_text(encoding="utf-8")
          replacements = {
              "estimated covariance rate:\\n": "estimated covariance rate:\\\\n",
              "exact covariance rate:\\n": "exact covariance rate:\\\\n",
              "ULA covariance:\\n": "ULA covariance:\\\\n",
              "MALA covariance:\\n": "MALA covariance:\\\\n",
              "empirical whitened covariance:\\n": "empirical whitened covariance:\\\\n",
              "conditional covariance:\\n": "conditional covariance:\\\\n",
              'axes[0].plot(selected[:, 0], selected[:, 3], "o-", label=label)':
                  'axes[0].plot(selected[:, 0], selected[:, 2], "o-", label=label)',
              'axes[1].plot(selected[:, 0], selected[:, 4], "o-", label=label)':
                  'axes[1].plot(selected[:, 0], selected[:, 3], "o-", label=label)',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise ValueError(f"missing generator source fragment: {old!r}")
              text = text.replace(old, new)

          old_iat = (
              "            mala_samples = mala.states[minimal_burn + 1 :]\n"
              "            print(\"MALA acceptance:\", round(float(mala.acceptance_rate), 4))\n"
          )
          new_iat = (
              "            mala_samples = mala.states[minimal_burn + 1 :]\n"
              "            ula_iat = empirical_integrated_autocorrelation_time(ula_samples[:, 0])\n"
              "            mala_iat = empirical_integrated_autocorrelation_time(mala_samples[:, 0])\n"
              "            print(\"empirical x1 IAT (ULA, MALA):\", round(ula_iat, 2), round(mala_iat, 2))\n"
              "            print(\"MALA acceptance:\", round(float(mala.acceptance_rate), 4))\n"
          )
          if old_iat not in text:
              raise ValueError("missing Langevin sample-summary block")
          text = text.replace(old_iat, new_iat, 1)

          old_hamiltonian_import = (
              "            from sampler_lab import spawn_rngs\n"
              "            from sampler_lab.dynamics import (\n"
              "                HamiltonianSystem,\n"
          )
          new_hamiltonian_import = (
              "            from sampler_lab.dynamics import (\n"
              "                HamiltonianSystem,\n"
          )
          if old_hamiltonian_import not in text:
              raise ValueError("missing Hamiltonian spawn_rngs import")
          text = text.replace(old_hamiltonian_import, new_hamiltonian_import, 1)

          old_hamiltonian_manifest = (
              '        "docs/notebooks/08_hamiltonian_and_underdamped_dynamics.ipynb": [\n'
              '            "sampler_lab.spawn_rngs",\n'
              '            "sampler_lab.models.GaussianTarget",\n'
              '        ],\n'
          )
          new_hamiltonian_manifest = (
              '        "docs/notebooks/08_hamiltonian_and_underdamped_dynamics.ipynb": [\n'
              '            "sampler_lab.models.GaussianTarget",\n'
              '        ],\n'
          )
          if old_hamiltonian_manifest not in text:
              raise ValueError("missing Hamiltonian manifest block")
          text = text.replace(old_hamiltonian_manifest, new_hamiltonian_manifest, 1)

          prefix, separator, suffix = text.rpartition("assert FIGURE_COUNT >= 6")
          if not separator:
              raise ValueError("missing geometry figure-count assertion")
          text = prefix + "assert FIGURE_COUNT >= 5" + suffix
          path.write_text(text, encoding="utf-8")
          PY
          python -m py_compile tools/bootstrap_pr3_notebooks.py
      - name: Generate PR 3 notebooks and documentation updates
        run: python tools/bootstrap_pr3_notebooks.py
      - name: Execute publication notebooks independently
        env:
          SAMPLER_LAB_NOTEBOOK_MODE: publication
        shell: bash
        run: |
          mkdir -p notebook-debug
          status=0
          for notebook in \
            docs/notebooks/07_langevin_sampling.ipynb \
            docs/notebooks/08_hamiltonian_and_underdamped_dynamics.ipynb \
            docs/notebooks/09_geometry_conditioning_and_ensembles.ipynb
          do
            log="notebook-debug/$(basename "$notebook").log"
            set +e
            pytest --nbmake "$notebook" --nbmake-timeout=900 --overwrite 2>&1 | tee "$log"
            code=${PIPESTATUS[0]}
            set -e
            if (( code != 0 )); then
              status=1
            fi
          done
          exit "$status"
      - name: Upload publication debug outputs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr3-publication-debug
          path: |
            docs/notebooks/07_langevin_sampling.ipynb
            docs/notebooks/08_hamiltonian_and_underdamped_dynamics.ipynb
            docs/notebooks/09_geometry_conditioning_and_ensembles.ipynb
            notebook-debug/
      - name: Normalize committed notebook outputs
        run: >-
          python tools/normalize_notebooks.py
          docs/notebooks/07_langevin_sampling.ipynb
          docs/notebooks/08_hamiltonian_and_underdamped_dynamics.ipynb
          docs/notebooks/09_geometry_conditioning_and_ensembles.ipynb
      - name: Remove one-shot bootstrap files
        run: |
          rm tools/bootstrap_pr3_notebooks.py
          rm tools/bootstrap_pr3_notebooks.py.gz.b64
          rm .github/workflows/bootstrap-pr3-notebooks.yml
      - name: Validate notebook manifest
        run: python tools/check_notebook_manifest.py
      - name: Check Ruff lint
        run: ruff check .
      - name: Check Ruff formatting
        run: ruff format --check .
      - name: Build strict documentation
        run: mkdocs build --strict --site-dir /tmp/sampler-lab-site
      - name: Remove documentation cache
        run: rm -rf .cache
      - name: Upload validation state
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr3-validation-state
          path: |
            README.md
            mkdocs.yml
            docs/notebooks/
            docs/methods/langevin_dynamics.md
            docs/methods/hamiltonian_dynamics.md
            docs/methods/conditioning_ensembles.md
      - name: Commit generated notebooks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add continuous dynamics and geometry tutorial notebooks"
          git push
