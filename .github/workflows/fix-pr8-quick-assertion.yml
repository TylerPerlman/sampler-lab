name: Fix PR 8 quick-mode assertion

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: fix-pr8-quick-assertion
  cancel-in-progress: true

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/notebook-continuous-geometry
          fetch-depth: 0
      - name: Replace noisy raw-IAT assertion
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("docs/notebooks/08_hamiltonian_and_underdamped_dynamics.ipynb")
          notebook = json.loads(path.read_text(encoding="utf-8"))
          old = "assert stiff_precision.empirical_iat < stiff_identity.empirical_iat"
          new = (
              "assert stiff_precision.ess_per_thousand_gradients "
              "> 3.0 * stiff_identity.ess_per_thousand_gradients"
          )
          matches = 0
          for cell in notebook["cells"]:
              if cell.get("cell_type") != "code":
                  continue
              source = "".join(cell.get("source", []))
              if old in source:
                  source = source.replace(old, new)
                  cell["source"] = source.splitlines(keepends=True)
                  matches += 1
          if matches != 1:
              raise ValueError(f"expected one assertion replacement, found {matches}")
          path.write_text(
              json.dumps(notebook, ensure_ascii=False, indent=1) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Remove one-shot workflow
        run: rm .github/workflows/fix-pr8-quick-assertion.yml
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Stabilize Hamiltonian notebook quick-mode validation"
          git push
