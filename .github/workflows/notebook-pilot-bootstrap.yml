name: Bootstrap notebook visual pilot

on:
  push:
    branches: [agent/notebook-visual-pilot]
    paths:
      - .github/workflows/notebook-pilot-bootstrap.yml
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/notebook-pilot-bootstrap.yml

permissions:
  contents: write
  pull-requests: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/notebook-visual-pilot
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,notebooks]'
      - name: Restore one-shot generator
        run: |
          python - <<'PY'
          import base64
          import zlib
          from pathlib import Path

          encoded = Path("tools/_bootstrap_notebook_pilot.py.zlib.b64").read_bytes()
          Path("tools/_bootstrap_notebook_pilot.py").write_bytes(
              zlib.decompress(base64.b64decode(encoded))
          )
          PY
      - name: Generate publication notebooks
        run: python tools/_bootstrap_notebook_pilot.py
      - name: Normalize and validate generated notebooks
        run: |
          python tools/normalize_notebooks.py
          python tools/check_notebook_manifest.py
      - name: Execute quick-mode notebooks
        env:
          SAMPLER_LAB_NOTEBOOK_MODE: quick
        run: pytest --nbmake docs/notebooks/*.ipynb --nbmake-timeout=300
      - name: Remove one-shot bootstrap files
        run: |
          git rm .github/workflows/notebook-pilot-bootstrap.yml
          git rm tools/_bootstrap_notebook_pilot.py.zlib.b64
          rm tools/_bootstrap_notebook_pilot.py
      - name: Run repository-facing checks
        run: |
          ruff check .
          ruff format --check .
          python tools/publication_check.py --root .
          python tools/check_notebook_manifest.py
          mkdocs build --strict
      - name: Commit generated notebooks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/notebooks
          git commit -m "Add executed notebook visual pilot"
          git push origin HEAD:agent/notebook-visual-pilot
