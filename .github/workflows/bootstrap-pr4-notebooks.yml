name: Bootstrap final notebook batch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: bootstrap-pr4-notebooks
  cancel-in-progress: true

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/notebook-learning-rare-benchmarks
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,notebooks]'
      - name: Restore notebook generator
        run: |
          cat tools/bootstrap_pr4_notebooks.py.gz.b64.part* \
            | base64 -d \
            | gzip -d \
            > /tmp/bootstrap_pr4_notebooks.py
          python -m py_compile /tmp/bootstrap_pr4_notebooks.py
      - name: Generate notebooks and documentation updates
        run: python /tmp/bootstrap_pr4_notebooks.py
      - name: Apply notebook lint corrections
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          replacements = {
              'axes[0].set_title("Robbins–Monro rate")':
                  'axes[0].set_title("Robbins-Monro rate")',
              'print("frozen-policy JSON round trip:", np.allclose(restored.parameters, frozen.parameters.reshape(-1)))':
                  'round_trip = np.allclose(restored.parameters, frozen.parameters.reshape(-1))\nprint("frozen-policy JSON round trip:", round_trip)',
              'f"{row.method:28s} exact_after_freeze={str(row.exact_after_freeze):5s} "':
                  'f"{row.method:28s} exact_after_freeze={row.exact_after_freeze!s:5s} "',
              'axis.set_title("Maintained method–target compatibility matrix")':
                  'axis.set_title("Maintained method-target compatibility matrix")',
              'print(" ", method, "×", target, "->", "; ".join(reasons))':
                  'print(" ", method, "x", target, "->", "; ".join(reasons))',
              'print("excluded:", exclusion.method, "×", exclusion.target, exclusion.reasons)':
                  'print("excluded:", exclusion.method, "x", exclusion.target, exclusion.reasons)',
          }
          for notebook_name in (
              "10_adaptive_and_learned_sampling.ipynb",
              "12_cross_method_benchmarking.ipynb",
          ):
              path = Path("docs/notebooks") / notebook_name
              notebook = json.loads(path.read_text(encoding="utf-8"))
              for cell in notebook["cells"]:
                  if cell.get("cell_type") != "code":
                      continue
                  source = "".join(cell.get("source", []))
                  for old, new in replacements.items():
                      source = source.replace(old, new)
                  cell["source"] = source.splitlines(keepends=True)
              path.write_text(
                  json.dumps(notebook, ensure_ascii=False, indent=1) + "\n",
                  encoding="utf-8",
              )
          PY
      - name: Execute publication notebooks independently
        env:
          SAMPLER_LAB_NOTEBOOK_MODE: publication
        shell: bash
        run: |
          mkdir -p /tmp/notebook-debug
          status=0
          for notebook in \
            docs/notebooks/10_adaptive_and_learned_sampling.ipynb \
            docs/notebooks/11_rare_event_sampling.ipynb \
            docs/notebooks/12_cross_method_benchmarking.ipynb
          do
            log="/tmp/notebook-debug/$(basename "$notebook").log"
            set +e
            pytest --nbmake "$notebook" --nbmake-timeout=1200 --overwrite 2>&1 | tee "$log"
            code=${PIPESTATUS[0]}
            set -e
            if (( code != 0 )); then
              status=1
            fi
          done
          exit "$status"
      - name: Upload publication debug state
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr4-publication-debug
          path: |
            docs/notebooks/10_adaptive_and_learned_sampling.ipynb
            docs/notebooks/11_rare_event_sampling.ipynb
            docs/notebooks/12_cross_method_benchmarking.ipynb
            /tmp/notebook-debug/
      - name: Normalize committed notebook outputs
        run: >-
          python tools/normalize_notebooks.py
          docs/notebooks/10_adaptive_and_learned_sampling.ipynb
          docs/notebooks/11_rare_event_sampling.ipynb
          docs/notebooks/12_cross_method_benchmarking.ipynb
      - name: Remove one-shot bootstrap files
        run: |
          rm -f tools/bootstrap_pr4_notebooks.py
          rm -f tools/bootstrap_pr4_notebooks.py.gz.b64.part*
          rm -f .github/workflows/bootstrap-pr4-notebooks.yml
          rm -f .github/workflows/debug-pr4-ruff.yml
      - name: Validate notebook manifest
        run: python tools/check_notebook_manifest.py
      - name: Check Ruff lint
        run: ruff check .
      - name: Check Ruff formatting
        run: ruff format --check .
      - name: Build strict documentation
        run: mkdocs build --strict --site-dir /tmp/sampler-lab-site
      - name: Remove documentation cache
        if: always()
        run: rm -rf .cache
      - name: Commit final notebook batch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add learned, rare-event, and benchmark tutorials"
          git push
