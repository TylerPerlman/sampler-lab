name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python tools/publication_check.py --root . --history
      - name: Verify tag matches package version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          PACKAGE_VERSION=$(python - <<'PY'
          import ast
          from pathlib import Path

          module = ast.parse(Path("src/sampler_lab/_version.py").read_text(encoding="utf-8"))
          values = {
              target.id: ast.literal_eval(node.value)
              for node in module.body
              if isinstance(node, ast.Assign)
              for target in node.targets
              if isinstance(target, ast.Name)
          }
          print(values["__version__"])
          PY
          )
          test "$RELEASE_TAG" = "v$PACKAGE_VERSION"
      - run: python -m build
      - name: Verify distributions
        run: |
          python tools/publication_check.py --root . --artifacts dist
          python -m pip install dist/*.whl
          python -c "import importlib.metadata as m; print(m.version('sampler-lab'))"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --verify-tag \
              --generate-notes \
              --title "Sampler Lab $RELEASE_TAG"
          fi
