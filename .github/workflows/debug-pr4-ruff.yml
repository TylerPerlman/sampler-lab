name: Diagnose final notebook lint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/notebook-learning-rare-benchmarks
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install ruff
      - name: Reconstruct and run generator
        run: |
          cat tools/bootstrap_pr4_notebooks.py.gz.b64.part* \
            | base64 -d \
            | gzip -d \
            > /tmp/bootstrap_pr4_notebooks.py
          python /tmp/bootstrap_pr4_notebooks.py
          rm -f tools/bootstrap_pr4_notebooks.py
          rm -f tools/bootstrap_pr4_notebooks.py.gz.b64.part*
          rm -f .github/workflows/bootstrap-pr4-notebooks.yml
          rm -f .github/workflows/debug-pr4-ruff.yml
      - name: Capture Ruff output
        shell: bash
        run: |
          set +e
          ruff check . --output-format=concise 2>&1 | tee /tmp/ruff.log
          code=${PIPESTATUS[0]}
          echo "$code" > /tmp/ruff-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pr4-ruff-diagnostic
          path: |
            /tmp/ruff.log
            /tmp/ruff-exit-code.txt
