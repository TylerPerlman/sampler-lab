name: Bug report
description: Report incorrect behavior, a regression, or a documentation failure
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping make the numerical behavior easier to trust.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include code, command-line arguments, and the RNG seed when applicable.
      render: python
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Sampler Lab version or commit
      placeholder: v0.12.0 or a commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python, NumPy, operating system, and installation method.
      render: text
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics or traceback
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for the same behavior.
          required: true
        - label: I included the seed and retained rejected/repeated states when relevant.
          required: false
